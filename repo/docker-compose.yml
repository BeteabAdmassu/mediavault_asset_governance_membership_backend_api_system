version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mediavault-api:1.0.0
    ports:
      - "5000:5000"
    volumes:
      - mediavault_data:/data
    environment:
      DATABASE_URL: "sqlite:////data/mediavault.db"
      FIELD_ENCRYPTION_KEY: "${FIELD_ENCRYPTION_KEY}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FILE: "/data/mediavault.log"
      API_VERSION: "1.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  mediavault_data:
